version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: jobboard-backend
    ports:
      - '5000:5000'
    environment:
      - PORT=5000
      - NODE_ENV=development
      - PG_USER=postgres
      - PG_HOST=postgres
      - PG_DATABASE=jobboard
      - PG_PASSWORD=postgres
      - PG_PORT=5432
      - MONGO_URI=mongodb://mongo:27017/jobboard
      - JWT_SECRET=supersecretjwtkey_replace_in_production
    depends_on:
      postgres:
        condition: service_healthy
      mongo:
        condition: service_started
    networks:
      - jobboard-network

  postgres:
    image: postgres:15-alpine
    container_name: jobboard-postgres
    ports:
      - '5432:5432'
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=jobboard
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/src/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d jobboard"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - jobboard-network

  mongo:
    image: mongo:6-jammy
    container_name: jobboard-mongo
    ports:
      - '27017:27017'
    volumes:
      - mongodata:/data/db
    networks:
      - jobboard-network

volumes:
  pgdata:
  mongodata:

networks:
  jobboard-network:
    driver: bridge
